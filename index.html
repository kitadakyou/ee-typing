<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ee-typing</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="stage">
    <section class="screen is-active">
      <h1 class="start-title">タイピング練習</h1>
      <p class="start-lead">モードを選んでスタート。</p>
      <div class="mode-select">
        <a class="btn-mode" href="/japanese/">日本語（長文）</a>
        <a class="btn-mode" href="/program/c-sharp/">C#</a>
        <a class="btn-mode" href="/program/typescript/">TypeScript</a>
      </div>
      <ul class="start-notes">
        <li><strong>IME をオフ（直接入力）</strong>にしてください。</li>
        <li>日本語は打ち方自由（し=<code>si</code>/<code>shi</code>、ん=<code>nn</code> など何でも正解）。</li>
        <li>コードは <strong>US 配列</strong>。行頭インデントは自動、行末で <code>Enter</code> を打ちます。</li>
        <li>最初の1打で計測が始まります。</li>
      </ul>
    </section>
  </main>
</body>
</html>
