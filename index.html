<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイピング練習（e-typing クローン）</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- ミス時の明転（白フラッシュ）用オーバーレイ -->
  <div id="flash" class="flash-overlay" aria-hidden="true"></div>

  <main class="stage">
    <!-- ===== スタート画面 ===== -->
    <section id="screen-start" class="screen is-active">
      <h1 class="start-title">タイピング練習</h1>
      <p class="start-lead">お題の文をローマ字で打ちます。全 <span id="start-count">5</span> 問。</p>
      <ul class="start-notes">
        <li><strong>IME をオフ（直接入力）</strong>にしてください。</li>
        <li>打ち方は自由です（し=<code>si</code>/<code>shi</code>、っ=重ね/<code>xtu</code>、ん=<code>nn</code> など何でも正解）。</li>
        <li>最初の1打で計測が始まります。</li>
      </ul>
      <button id="btn-start" class="btn-primary" type="button">スタート（または Space / Enter）</button>
    </section>

    <!-- ===== プレイ画面 ===== -->
    <section id="screen-play" class="screen">
      <div class="play-bar">
        <span id="progress" class="progress">1 / 5</span>
        <span id="live-acc" class="live-acc">正確率 100%</span>
      </div>

      <!-- お題パネル -->
      <section class="board" aria-label="お題">
        <p id="display" class="display"></p>
        <p id="reading" class="reading"></p>
        <p id="romaji" class="romaji">
          <span class="typed" id="romaji-typed"></span><span class="rest" id="romaji-rest"></span>
        </p>
      </section>

      <!-- キーボード -->
      <section class="keyboard-wrap" aria-label="キーボード">
        <div id="keyboard" class="keyboard"></div>
      </section>

      <!-- 両手 -->
      <section class="hands-wrap" aria-label="両手">
        <div id="hands"></div>
      </section>
    </section>

    <!-- ===== 結果画面 ===== -->
    <section id="screen-result" class="screen">
      <h2 class="result-title">結果</h2>
      <div class="result-rank">
        <span class="rank-label">ランク</span>
        <span id="result-rank" class="rank-value">A</span>
      </div>
      <div class="result-grid">
        <div class="stat"><span class="stat-num" id="result-score">0</span><span class="stat-cap">スコア</span></div>
        <div class="stat"><span class="stat-num" id="result-wpm">0</span><span class="stat-cap">WPM</span></div>
        <div class="stat"><span class="stat-num" id="result-kpm">0</span><span class="stat-cap">KPM</span></div>
        <div class="stat"><span class="stat-num" id="result-acc">0%</span><span class="stat-cap">正確率</span></div>
        <div class="stat"><span class="stat-num" id="result-correct">0</span><span class="stat-cap">正打数</span></div>
        <div class="stat"><span class="stat-num" id="result-miss">0</span><span class="stat-cap">ミス数</span></div>
      </div>
      <div class="weak-wrap">
        <div class="weak-col">
          <h3 class="weak-head">苦手なキー</h3>
          <ul id="weak-keys" class="weak-list"></ul>
        </div>
        <div class="weak-col">
          <h3 class="weak-head">苦手な指</h3>
          <ul id="weak-fingers" class="weak-list"></ul>
        </div>
      </div>
      <button id="btn-retry" class="btn-primary" type="button">もう一度（または Space / Enter）</button>
    </section>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
